repo_id: LLMClaudeCode
role: Claude Code CLI adapter for llms.Model
owns:
  - cli path discovery
  - command argument construction
  - stream-json output parsing
  - thinking block rendering policy
  - tool event summary formatting
  - session-related option mapping
not_owns:
  - WeCom protocol
  - command routing
  - deployment workflow
entrypoints:
  - pkg/llm.go
  - pkg/options.go
depends_on:
  - github.com/tmc/langchaingo
  - local claude CLI binary
high_risk_areas:
  - pkg/llm.go
  - pkg/options.go
read_first:
  - AGENTS.md
  - README.md
  - .harness/README.md
  - .harness/generated/module-map.md
  - .harness/generated/contract-index.yaml
  - .harness/generated/validation-index.yaml
  - .harness/generated/api-index.md
  - .harness/architecture.md
base_branch: main
